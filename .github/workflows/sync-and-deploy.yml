name: Sync Instamojo Data and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: instamojo-analysis-pages
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json

      - name: Sync Instamojo to Firestore and rebuild dashboard snapshot
        env:
          INSTAMOJO_API_KEY: ${{ secrets.INSTAMOJO_API_KEY }}
          INSTAMOJO_AUTH_TOKEN: ${{ secrets.INSTAMOJO_AUTH_TOKEN }}
          INSTAMOJO_PRIVATE_SALT: ${{ secrets.INSTAMOJO_PRIVATE_SALT }}
          FIREBASE_SERVICE_ACCOUNT_PATH: firebase-service-account.json
        run: npm run sync

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
